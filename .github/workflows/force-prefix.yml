name: Force Prefix To Exclamation

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  force-prefix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Reject Action Edits by Scoopala
        run: |
          ACTOR="${{ github.actor }}"
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')
          COMMIT_EMAIL=$(git log -1 --pretty=format:'%ae')
          
          if [[ "$ACTOR" == *"Scoopala"* || "$COMMIT_AUTHOR" == *"Scoopala"* || "$COMMIT_EMAIL" == *"Scoopala"* ]]; then
            echo "detected push/commit by scoopala."
            if git diff-tree --no-commit-id --name-only -r HEAD | grep -q 'force-prefix.yml'; then
              echo "scoopala tried to edit the force-prefix action! reverting action file..."
              
              # Revert the action file from the previous commit
              git checkout HEAD~1 -- .github/workflows/force-prefix.yml
              
              # Configure git
              git config --global user.name "Prefix Enforcer Bot"
              git config --global user.email "prefix-enforcer@users.noreply.github.com"
              
              # Commit and push revert
              git add .github/workflows/force-prefix.yml
              git commit -m "build: revert unauthorized edits to force-prefix action by scoopala [skip ci]"
              git push
              
              echo "unauthorized edit has been reverted and blocked."
              exit 1
            fi
          fi

      - name: Check and Fix Prefix
        run: |
          # Read main.py and check if the prefix is "!"
          if ! grep -q 'command_prefix="!"' main.py; then
            echo "unacceptable prefix detected! restoring exclamation point..."
            # Replace command_prefix with "!"
            sed -i 's/command_prefix=".*"/command_prefix="!"/g' main.py
            
            # Configure git
            git config --global user.name "Prefix Enforcer Bot"
            git config --global user.email "prefix-enforcer@users.noreply.github.com"
            
            # Commit and push back
            git add main.py
            git commit -m "build: force prefix back to ! — exclamation point superiority [skip ci]"
            git push
          else
            echo "prefix is already !. all is well in the universe."
          fi
